# Portainer deployment — no nginx, app exposed directly on port 8080
# Build: Portainer clones this repo and builds the image from ./web/Dockerfile
# Secrets: set in Portainer stack environment variables (never in this file)

services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: msp_app
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://msp_user:${POSTGRES_PASSWORD}@msp_postgres:5432/msp_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@msp_redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NEXT_PUBLIC_APP_URL: http://10.50.49.15:8080
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      LOGIN_MAX_ATTEMPTS: "5"
      LOGIN_LOCKOUT_SECONDS: "900"
      SESSION_MAX_AGE: "28800"
      IMAP_POLL_INTERVAL_MINUTES: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - msp_uploads:/app/uploads
    networks:
      - msp_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    container_name: msp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: msp_platform
      POSTGRES_USER: msp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - msp_postgres_data:/var/lib/postgresql/data
    networks:
      - msp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msp_user -d msp_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: msp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - msp_redis_data:/data
    networks:
      - msp_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  msp_postgres_data:
  msp_redis_data:
  msp_uploads:

networks:
  msp_network:
    driver: bridge
