version: "3.9"

# Development override — mounts source, enables hot reload, exposes DB port
services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: msp_app_dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
      - uploads:/app/uploads
    ports:
      - "3000:3000"
    command: npm run dev

  postgres:
    ports:
      - "5432:5432"   # expose for DB clients (TablePlus, DBeaver etc.)

  redis:
    ports:
      - "6379:6379"

  # No nginx/certbot in dev — app runs directly on port 3000
  nginx:
    profiles: ["disabled"]
  certbot:
    profiles: ["disabled"]
  backup:
    profiles: ["disabled"]
